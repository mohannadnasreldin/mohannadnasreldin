name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohannadnasreldin
          template: classic
          base: header, activity, community, repositories
          filename: github-stats.svg
          config_timezone: Africa/Cairo

      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohannadnasreldin
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          filename: github-langs.svg
          config_timezone: Africa/Cairo

      - name: Generate habits/streak card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohannadnasreldin
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          filename: github-streak.svg
          config_timezone: Africa/Cairo
