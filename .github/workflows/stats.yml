name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # allows manual trigger from the Actions tab
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohannadnasreldin
          template: classic
          base: header, activity, community, repositories
          filename: github-stats.svg
          config_timezone: Africa/Cairo

      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mohannadnasreldin
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          filename: github-langs.svg
          config_timezone: Africa/Cairo

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats-action@v1
        with:
          user: mohannadnasreldin
          filename: github-streak.svg
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
